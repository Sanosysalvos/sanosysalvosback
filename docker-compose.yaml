services:
  ms-users:
    image: leaduran/ms-users:latest
    container_name: ms-users
    deploy:
      resources:
        limits:
          memory: 220M # Subimos un poco el límite ya que ahora hay más espacio
    ports:
      - "8081:8081"
    environment:
      - SERVER_PORT=8081
      - SPRING_DATASOURCE_URL=jdbc:postgresql://${DB_HOST}:5432/${DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - JAVA_OPTS=-Xmx150m -Xms64m
    networks:
      - sanos-network

  ms-pets:
    image: leaduran/ms-pets:latest
    container_name: ms-pets
    deploy:
      resources:
        limits:
          memory: 220M
    ports:
      - "8082:8082"
    environment:
      - SERVER_PORT=8082
      - SPRING_DATASOURCE_URL=jdbc:postgresql://${DB_HOST}:5432/${DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - JAVA_OPTS=-Xmx150m -Xms64m
    networks:
      - sanos-network

  bff:
    image: leaduran/bff:latest
    container_name: bff
    deploy:
      resources:
        limits:
          memory: 200M
    ports:
      - "80:80"
    depends_on:
      - ms-users
      - ms-pets
    environment:
      - SERVER_PORT=80
      - USERS_SERVICE_URL=http://ms-users:8081
      - PETS_SERVICE_URL=http://ms-pets:8082
      # URL temporal o vacía para no romper el código si el BFF la requiere
      - NOTIFICATION_SERVICE_URL=http://localhost:8083
      - JAVA_OPTS=-Xmx128m -Xms64m
    networks:
      - sanos-network

networks:
  sanos-network:
    driver: bridge
