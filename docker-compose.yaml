services:
  ms-users:
    image: leaduran/ms-users:latest
    container_name: ms-users
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 200M
    ports:
      - "8081:8081"
    environment:
      - SERVER_PORT=8081
      - SPRING_DATASOURCE_URL=jdbc:postgresql://${DB_HOST}:5432/${DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - JAVA_OPTS=-Xmx128m -Xms64m
    networks:
      - sanos-network

  ms-pets:
    image: leaduran/ms-pets:latest
    container_name: ms-pets
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 200M
    ports:
      - "8082:8082"
    environment:
      - SERVER_PORT=8082
      - SPRING_DATASOURCE_URL=jdbc:postgresql://${DB_HOST}:5432/${DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - JAVA_OPTS=-Xmx128m -Xms64m
    networks:
      - sanos-network

  ms-notification:
    image: leaduran/ms-notification:latest
    container_name: ms-notification
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 180M
    ports:
      - "8083:8083"
    environment:
      - SERVER_PORT=8083
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - SENDGRID_FROM_EMAIL=${SENDGRID_FROM_EMAIL}
      - JAVA_OPTS=-Xmx100m -Xms50m
    networks:
      - sanos-network

  bff:
    image: leaduran/bff:latest
    container_name: bff
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 180M
    ports:
      - "80:80"
    depends_on:
      - ms-users
      - ms-pets
      - ms-notification
    environment:
      - SERVER_PORT=80
      - USERS_SERVICE_URL=http://ms-users:8081
      - PETS_SERVICE_URL=http://ms-pets:8082
      - NOTIFICATION_SERVICE_URL=http://ms-notification:8083
      - JAVA_OPTS=-Xmx100m -Xms50m
    networks:
      - sanos-network

networks:
  sanos-network:
    driver: bridge
