version: '3.8'

services:
  ms-users:
    build: ./ms-users
    container_name: ms-users
    ports:
      - "${PORT_USERS}:${PORT_USERS}"
    environment:
      - SERVER_PORT=${PORT_USERS}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://${AWS_DB_ENDPOINT}:5432/${DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 350M # Evita que el micro colapse la RAM de la EC2
    networks:
      - sanos-network

  ms-pets:
    build: ./ms-pets
    container_name: ms-pets
    ports:
      - "${PORT_PETS}:${PORT_PETS}"
    environment:
      - SERVER_PORT=${PORT_PETS}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://${AWS_DB_ENDPOINT}:5432/${DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 350M
    networks:
      - sanos-network

  bff:
    build: ./bff
    container_name: bff
    ports:
      - "8080:8080"
    depends_on:
      - ms-users
      - ms-pets
    environment:
      - SERVER_PORT=8080
      - USERS_SERVICE_URL=http://ms-users:${PORT_USERS}
      - PETS_SERVICE_URL=http://ms-pets:${PORT_PETS}
    deploy:
      resources:
        limits:
          memory: 400M
    networks:
      - sanos-network

networks:
  sanos-network:
    driver: bridge