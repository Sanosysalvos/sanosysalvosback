version: '3.8'

services:
  # --- ms-users apunta ahora a AWS ---
  ms-users:
    build: ./ms-users
    container_name: ms-users
    ports:
      - "${PORT_USERS}:${PORT_USERS}"
    environment:
      - SERVER_PORT=${PORT_USERS}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://${AWS_DB_ENDPOINT}:5432/${DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}

  # --- ms-pets apunta ahora a AWS ---
  ms-pets:
    build: ./ms-pets
    container_name: ms-pets
    ports:
      - "${PORT_PETS}:${PORT_PETS}"
    environment:
      - SERVER_PORT=${PORT_PETS}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://${AWS_DB_ENDPOINT}:5432/${DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}

  bff:
    build: ./bff
    container_name: bff
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - USERS_SERVICE_URL=http://ms-users:${PORT_USERS}
      - PETS_SERVICE_URL=http://ms-pets:${PORT_PETS}